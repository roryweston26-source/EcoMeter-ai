name: Weekly Publish

# Every Monday: refresh prices, and if anything changed, build the extension and
# upload it to the Chrome Web Store as a DRAFT. The version is only bumped if the
# store rejects the current one as a duplicate (so manual version bumps are
# respected and never double-bumped). You then get a GitHub issue asking you to
# click "Publish" in the dashboard.
#
# Requires four repo secrets (Settings → Secrets and variables → Actions):
#   CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN, CWS_EXTENSION_ID

on:
  schedule:
    # Monday 09:15 UTC — a little after the old price-sync slot.
    - cron: '15 9 * * 1'
  workflow_dispatch:
    # Manual run forces a build even if prices did not change.

concurrency:
  group: weekly-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # commit the price/version bump, create a Release
      issues: write        # open the "ready to publish" notification issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Refresh prices ────────────────────────────────────────────────────
      - name: Update prices
        id: prices
        run: |
          set +e
          node scripts/update-prices.js
          code=$?
          set -e
          echo "Price updater exited with code $code"
          if [ "$code" = "1" ]; then
            echo "✗ Price updater errored."
            exit 1
          fi

      # ── Decide whether there is anything to ship ──────────────────────────
      - name: Detect changes
        id: detect
        run: |
          if ! git diff --quiet -- extension/prices.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prices changed — will build a new version."
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No price change, but manual run — forcing a build."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ No price changes — nothing to publish this week."
          fi

      # ── Chrome Web Store: verify secrets + get an access token ────────────
      - name: Check store secrets exist
        id: secrets_check
        if: steps.detect.outputs.changed == 'true'
        run: |
          if [ -n "${{ secrets.CWS_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.CWS_CLIENT_SECRET }}" ] && \
             [ -n "${{ secrets.CWS_REFRESH_TOKEN }}" ] && \
             [ -n "${{ secrets.CWS_EXTENSION_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "✗ Chrome Web Store secrets not configured."
            exit 1
          fi

      - name: Get store access token
        id: access_token
        if: steps.detect.outputs.changed == 'true' && steps.secrets_check.outputs.ready == 'true'
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).access_token)}catch(e){console.log('')}})")
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "undefined" ]; then
            echo "✗ Failed to get access token. Check your CWS secrets (refresh token may have expired)."
            echo "$RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "✓ Got access token"

      # ── Build + upload as a DRAFT. Upload the CURRENT manifest version as-is;
      #    only bump-and-retry if the store rejects it as a duplicate. So a
      #    manual version bump is respected, a stale version self-heals, and
      #    manual + automatic uploads never double-bump. ──────────────────────
      - name: Build & upload (bump only on collision)
        id: publish
        if: steps.detect.outputs.changed == 'true' && steps.secrets_check.outputs.ready == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          TOKEN: ${{ steps.access_token.outputs.token }}
        run: |
          uploaded=false
          version=""
          for attempt in 1 2 3 4 5 6; do
            version=$(node -e "console.log(require('./extension/manifest.json').version)")
            zip="ecometer-ai-v${version}.zip"
            rm -f "$zip"
            ( cd extension && zip -qr "../$zip" . --exclude "*.DS_Store" --exclude "*/.gitkeep" )
            echo "Attempt $attempt — uploading v$version…"

            RESPONSE=$(curl -s -X PUT \
              "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID" \
              -H "Authorization: Bearer $TOKEN" -H "x-goog-api-version: 2" -T "$zip")
            STATUS=$(echo "$RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const r=JSON.parse(d);console.log(r.uploadState||(r.error&&r.error.message)||'unknown')}catch(e){console.log('parse-error')}})")
            ERROR_CODE=$(echo "$RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const r=JSON.parse(d);console.log((r.itemError&&r.itemError[0]&&r.itemError[0].error_code)||'')}catch(e){console.log('')}})")
            echo "  status: $STATUS   error_code: $ERROR_CODE"

            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "IN_PROGRESS" ]; then
              uploaded=true
              echo "✓ Uploaded v$version as a DRAFT."
              break
            elif [ "$ERROR_CODE" = "PKG_INVALID_VERSION_NUMBER" ]; then
              newv=$(node scripts/bump-version.js)
              echo "  ↻ v$version already on the store — bumped to v$newv, retrying."
              continue
            elif [ "$ERROR_CODE" = "ITEM_NOT_UPDATABLE" ]; then
              echo "⚠ Skipped: the current store item is in review or otherwise locked — will retry next run."
              break
            else
              echo "✗ Upload failed: $STATUS"
              echo "Full response: $RESPONSE"
              exit 1
            fi
          done

          echo "uploaded=$uploaded" >> "$GITHUB_OUTPUT"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "tag=v$version"      >> "$GITHUB_OUTPUT"
          if [ "$uploaded" != "true" ]; then
            echo "No upload committed this run."
          fi

      # ── Persist prices + any version bump (only when the draft uploaded) ──
      - name: Commit price + version bump
        if: steps.publish.outputs.uploaded == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/prices.json extension/manifest.json
          git commit -m "chore: weekly publish — v${{ steps.publish.outputs.version }}" || echo "nothing to commit"
          git push

      - name: Create GitHub Release
        if: steps.publish.outputs.uploaded == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.publish.outputs.tag }}
          target_commitish: main
          name: EcoMeter AI ${{ steps.publish.outputs.tag }}
          generate_release_notes: true
          files: ecometer-ai-v${{ steps.publish.outputs.version }}.zip
          body: |
            ## EcoMeter AI ${{ steps.publish.outputs.tag }}

            Weekly build with refreshed model prices. Uploaded to the Chrome
            Web Store as a **draft** — publish it from the developer dashboard.

      # ── Notify: open an issue asking you to click Publish ─────────────────
      - name: Open "ready to publish" issue
        if: steps.publish.outputs.uploaded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.publish.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          node -e '
            const v = process.env.VERSION;
            const body = [
              "EcoMeter AI **v" + v + "** was uploaded to the Chrome Web Store as a draft with refreshed prices.",
              "",
              "**Action needed:** open the developer dashboard and click **Publish**.",
              "",
              "https://chrome.google.com/webstore/devconsole",
              "",
              "_Opened automatically by the Weekly Publish workflow._"
            ].join("\n");
            const data = JSON.stringify({
              title: "Publish EcoMeter AI v" + v + " to the Chrome Web Store",
              body,
              labels: ["publish"]
            });
            const https = require("https");
            const req = https.request({
              hostname: "api.github.com",
              path: "/repos/" + process.env.REPO + "/issues",
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.GH_TOKEN,
                "Accept": "application/vnd.github+json",
                "User-Agent": "ecometer-publish-bot",
                "Content-Type": "application/json"
              }
            }, res => {
              let d = ""; res.on("data", c => d += c);
              res.on("end", () => {
                console.log("Issue API status:", res.statusCode);
                if (res.statusCode >= 300) { console.log(d); process.exit(1); }
              });
            });
            req.on("error", e => { console.error(e); process.exit(1); });
            req.write(data); req.end();
          '
