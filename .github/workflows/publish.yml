name: Weekly Publish

# Every Monday: refresh prices, and if anything changed, bump the version,
# build the extension, and upload it to the Chrome Web Store as a DRAFT.
# You then get a GitHub issue asking you to click "Publish" in the dashboard.
#
# Requires four repo secrets (Settings → Secrets and variables → Actions):
#   CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN, CWS_EXTENSION_ID

on:
  schedule:
    # Monday 09:15 UTC — a little after the old price-sync slot.
    - cron: '15 9 * * 1'
  workflow_dispatch:
    # Manual run forces a build even if prices did not change.

concurrency:
  group: weekly-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # commit the price/version bump, create a Release
      issues: write        # open the "ready to publish" notification issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Refresh prices ────────────────────────────────────────────────────
      - name: Update prices
        id: prices
        run: |
          set +e
          node scripts/update-prices.js
          code=$?
          set -e
          echo "Price updater exited with code $code"
          if [ "$code" = "1" ]; then
            echo "✗ Price updater errored."
            exit 1
          fi

      # ── Decide whether there is anything to ship ──────────────────────────
      - name: Detect changes
        id: detect
        run: |
          if ! git diff --quiet -- extension/prices.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prices changed — will build a new version."
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No price change, but manual run — forcing a build."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ No price changes — nothing to publish this week."
          fi

      # ── Bump the manifest version (required by the store) ─────────────────
      - name: Bump version
        id: version
        if: steps.detect.outputs.changed == 'true'
        run: |
          NEW=$(node scripts/bump-version.js)
          echo "version=$NEW"     >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW"        >> "$GITHUB_OUTPUT"
          echo "Bumped manifest to $NEW"

      # ── Build the zip ─────────────────────────────────────────────────────
      - name: Build zip
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd extension
          zip -r ../ecometer-ai-v${{ steps.version.outputs.version }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "*/.gitkeep"
          ls -lh ../ecometer-ai-v${{ steps.version.outputs.version }}.zip

      # ── Chrome Web Store: get token, upload as draft ──────────────────────
      - name: Check store secrets exist
        id: secrets_check
        if: steps.detect.outputs.changed == 'true'
        run: |
          if [ -n "${{ secrets.CWS_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.CWS_CLIENT_SECRET }}" ] && \
             [ -n "${{ secrets.CWS_REFRESH_TOKEN }}" ] && \
             [ -n "${{ secrets.CWS_EXTENSION_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "✗ Chrome Web Store secrets not configured."
            exit 1
          fi

      - name: Get store access token
        if: steps.detect.outputs.changed == 'true' && steps.secrets_check.outputs.ready == 'true'
        id: access_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).access_token))")
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "undefined" ]; then
            echo "✗ Failed to get access token. Check your CWS secrets (refresh token may have expired)."
            echo "$RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "✓ Got access token"

      - name: Upload new version (draft)
        id: upload
        if: steps.detect.outputs.changed == 'true' && steps.secrets_check.outputs.ready == 'true'
        run: |
          EXTENSION_ID="${{ secrets.CWS_EXTENSION_ID }}"
          ZIP="ecometer-ai-v${{ steps.version.outputs.version }}.zip"
          TOKEN="${{ steps.access_token.outputs.token }}"

          echo "Uploading $ZIP to Chrome Web Store..."
          RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP")

          STATUS=$(echo "$RESPONSE" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).uploadState || (JSON.parse(d).error&&JSON.parse(d).error.message) || 'unknown'))")
          ERROR_CODE=$(echo "$RESPONSE" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{ try { const r=JSON.parse(d); console.log((r.itemError&&r.itemError[0]&&r.itemError[0].error_code)||''); } catch(e){console.log('');} })")

          echo "Upload status: $STATUS"

          if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "IN_PROGRESS" ]; then
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
            echo "✓ Uploaded v${{ steps.version.outputs.version }} as a DRAFT."
          elif [ "$ERROR_CODE" = "ITEM_NOT_UPDATABLE" ]; then
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            echo "⚠ Skipped: the current version is still in review or otherwise locked."
            echo "  No action needed — it will retry next week. Not committing the version bump."
          else
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            echo "✗ Upload failed: $STATUS"
            echo "Full response: $RESPONSE"
            exit 1
          fi

      # ── Persist the bump + prices (only when the draft actually uploaded) ──
      - name: Commit price + version bump
        if: steps.upload.outputs.uploaded == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/prices.json extension/manifest.json
          git commit -m "chore: weekly publish — v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: steps.upload.outputs.uploaded == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: main
          name: EcoMeter AI ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ecometer-ai-v${{ steps.version.outputs.version }}.zip
          body: |
            ## EcoMeter AI ${{ steps.version.outputs.tag }}

            Weekly build with refreshed model prices. Uploaded to the Chrome
            Web Store as a **draft** — publish it from the developer dashboard.

      # ── Notify: open an issue asking you to click Publish ─────────────────
      - name: Open "ready to publish" issue
        if: steps.upload.outputs.uploaded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          node -e '
            const v = process.env.VERSION;
            const body = [
              "EcoMeter AI **v" + v + "** was uploaded to the Chrome Web Store as a draft with refreshed prices.",
              "",
              "**Action needed:** open the developer dashboard and click **Publish**.",
              "",
              "https://chrome.google.com/webstore/devconsole",
              "",
              "_Opened automatically by the Weekly Publish workflow._"
            ].join("\n");
            const data = JSON.stringify({
              title: "Publish EcoMeter AI v" + v + " to the Chrome Web Store",
              body,
              labels: ["publish"]
            });
            const https = require("https");
            const req = https.request({
              hostname: "api.github.com",
              path: "/repos/" + process.env.REPO + "/issues",
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.GH_TOKEN,
                "Accept": "application/vnd.github+json",
                "User-Agent": "ecometer-publish-bot",
                "Content-Type": "application/json"
              }
            }, res => {
              let d = ""; res.on("data", c => d += c);
              res.on("end", () => {
                console.log("Issue API status:", res.statusCode);
                if (res.statusCode >= 300) { console.log(d); process.exit(1); }
              });
            });
            req.on("error", e => { console.error(e); process.exit(1); });
            req.write(data); req.end();
          '
